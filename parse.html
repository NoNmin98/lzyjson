<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LZY JSON</title>
    <link rel="stylesheet" href="./styles.css?v=20260615-asset5" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">{ }</span>
          <div>
            <h1>LZY JSON</h1>
            <p>从日志、截断文本、转义字符串里把 JSON 看清楚</p>
          </div>
        </div>
        <div class="top-actions">
          <a class="icon-btn link-btn" href="./parse.html">JSON 解析</a>
          <a class="icon-btn link-btn" href="./compare.html">JSON 对比</a>
          <a class="icon-btn link-btn" href="./merge.html">JSON 合并</a>
          <a class="icon-btn link-btn" href="./escape.html">转义</a>
        </div>
      </header>

      <section class="workspace">
        <section class="pane input-pane" aria-label="输入区">
          <div class="pane-head">
            <div>
              <h2>输入</h2>
              <span id="inputMeta">0 字符</span>
            </div>
            <div class="inline-actions">
              <div class="case-menu">
                <button id="caseMenuBtn" type="button" aria-expanded="false">案例</button>
                <div id="caseMenu" class="case-popover" hidden>
                  <button type="button" data-sample="normal">日志 JSON</button>
                  <button type="button" data-sample="multi">多 JSON</button>
                  <button type="button" data-sample="escapedSingle">单层转义 JSON</button>
                  <button type="button" data-sample="escapedMulti">多层转义 JSON</button>
                  <button type="button" data-sample="long">超长 JSON</button>
                </div>
              </div>
              <button id="formatInputBtn" type="button">格式化</button>
            </div>
          </div>
          <textarea
            id="sourceInput"
            spellcheck="false"
            placeholder='粘贴 JSON、日志、JSON Lines、半截响应，或包含 "{\"code\":0}" 的字符串'
          ></textarea>
        </section>

        <div
          id="splitHandle"
          class="split-handle"
          role="separator"
          aria-label="调整输入和结果宽度"
          aria-orientation="vertical"
        ></div>

        <section class="pane result-pane" aria-label="结果区">
          <div class="pane-head">
            <div>
              <h2>结果</h2>
              <span id="resultMeta">等待输入</span>
            </div>
            <div class="inline-actions">
              <button id="copyBtn" type="button">复制</button>
              <button id="minifyBtn" type="button">复制压缩文本</button>
              <button id="maskToggleBtn" type="button">脱敏</button>
              <button id="clearBtn" type="button">清空</button>
            </div>
          </div>

          <div id="statusPanel" class="status-panel idle">
            粘贴内容后自动解析。所有处理都在本地浏览器完成。
          </div>

          <div id="candidateBar" class="candidate-bar" hidden></div>

          <button id="contextToggle" class="context-toggle" type="button" hidden>
            检测到前缀/后缀
          </button>

          <div id="contextPanel" class="context-popover" hidden>
            <div class="context-popover-head">
              <strong>前缀 / 后缀</strong>
              <button id="contextCloseBtn" type="button">关闭</button>
            </div>
            <div class="context-item">
              <div class="context-head">
                <strong>前缀</strong>
                <button id="copyPrefixBtn" type="button">复制</button>
              </div>
              <div id="prefixView" class="context-tokens"></div>
            </div>
            <div class="context-item">
              <div class="context-head">
                <strong>后缀</strong>
                <button id="copySuffixBtn" type="button">复制</button>
              </div>
              <div id="suffixView" class="context-tokens"></div>
            </div>
          </div>

          <div class="tool-row">
            <label class="search-box">
              <span>搜索</span>
              <input id="searchInput" type="search" placeholder="key / value / 路径" />
            </label>
            <div class="switches" aria-label="解析选项">
              <label title="把字符串里的 \\u4e2d\\u6587 显示成中文">
                <input id="decodeUnicodeOption" type="checkbox" />
                <span>中文转义</span>
              </label>
              <label title="只展开字符串里的第一层 JSON">
                <input id="expandStringJsonSingleOption" type="checkbox" />
                <span>单层转义 JSON</span>
              </label>
              <label title="递归展开字符串里嵌套的 JSON">
                <input id="expandStringJsonDeepOption" type="checkbox" />
                <span>多层转义 JSON</span>
              </label>
            </div>
            <div class="font-controls" aria-label="文本字号">
              <button id="fontDownBtn" type="button">A-</button>
              <span id="fontSizeLabel">13px</span>
              <button id="fontUpBtn" type="button">A+</button>
            </div>
            <div class="tabs" role="tablist" aria-label="结果视图">
              <button class="tab active" id="treeTab" type="button">树</button>
              <button class="tab" id="rawTab" type="button">文本</button>
              <button class="tab" id="tableTab" type="button">表格</button>
            </div>
          </div>

          <div class="view-stack">
            <div id="treeView" class="tree-view"></div>
            <div id="rawView" class="raw-view json-text-view" hidden></div>
            <div id="tableView" class="table-view" hidden></div>
            <div id="diffView" class="diff-view" hidden>
              <div class="diff-input-row">
                <div>
                  <strong>左侧</strong>
                  <p>当前解析结果</p>
                </div>
                <label>
                  <span>右侧</span>
                  <textarea
                    id="diffInput"
                    spellcheck="false"
                    placeholder="粘贴另一份 JSON、日志或响应，用来和当前结果对比"
                  ></textarea>
                </label>
              </div>
              <div id="diffSummary" class="diff-summary">等待右侧输入</div>
              <div id="diffResult" class="diff-result"></div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="./app.js?v=20260615-asset5"></script>
  </body>
</html>
