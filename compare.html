<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LZY JSON 对比</title>
    <link rel="stylesheet" href="./styles.css?v=20260625-home3" />
  </head>
  <body>
    <main class="app-shell compare-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">{ }</span>
          <div>
            <h1>JSON 对比</h1>
            <p>比较两份 JSON 的字段新增、删除和值变化</p>
          </div>
        </div>
        <div class="top-actions">
          <a class="icon-btn link-btn" href="./parse.html">JSON 解析</a>
          <a class="icon-btn link-btn" href="./compare.html">JSON 对比</a>
          <a class="icon-btn link-btn" href="./merge.html">JSON 合并</a>
          <a class="icon-btn link-btn" href="./escape.html">转义</a>
        </div>
      </header>

      <section class="compare-workspace">
        <div class="page-actions">
          <div class="case-menu">
            <button id="compareCaseBtn" type="button" aria-expanded="false">案例</button>
            <div id="compareCaseMenu" class="case-popover" hidden>
              <button type="button" data-compare-sample="complex">复杂差异</button>
              <button type="button" data-compare-sample="simple">基础差异</button>
            </div>
          </div>
          <button id="compareClearBtn" type="button">清空</button>
        </div>
        <section class="compare-grid">
          <label class="compare-pane">
            <span>左侧</span>
            <textarea id="leftInput" spellcheck="false" placeholder="粘贴第一份 JSON 或日志"></textarea>
          </label>
          <label class="compare-pane">
            <span>右侧</span>
            <textarea id="rightInput" spellcheck="false" placeholder="粘贴第二份 JSON 或日志"></textarea>
          </label>
        </section>

        <section class="compare-result-pane">
          <div id="compareSummary" class="diff-summary">等待输入</div>
          <div id="compareResult" class="diff-result"></div>
        </section>
      </section>

      <footer class="site-footer">
        <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">京ICP备2026028650号-2</a>
      </footer>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./compare.js?v=20260615-asset5"></script>
  </body>
</html>
